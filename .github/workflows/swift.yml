name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app # Adjust to the version you used

      - name: Build App (No Signing)
        run: |
          xcodebuild archive \
            -scheme "YourAppName" \
            -configuration Release \
            -archivePath ./build/YourApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Prepare App Bundle
        run: |
          mkdir -p ./dist
          cp -R ./build/YourApp.xcarchive/Products/Applications/*.app ./dist/
          cd dist
          zip -r ../MastodonMenuBar.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MastodonMenuBar-Build
          path: MastodonMenuBar.zip
